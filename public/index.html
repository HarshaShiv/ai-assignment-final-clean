<!DOCTYPE html>
<html>
<head>
<title>AI Healthcare Assistant</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 50px;
  color: white;

  background-image: url("https://images.unsplash.com/photo-1585435557343-3b092031a831");
  background-size: cover;
  background-position: center;
}

.container {
  background: rgba(0,0,0,0.65);
  padding: 40px;
  border-radius: 15px;
  display: inline-block;
  width: 500px;
}

h1 {
  font-size: 36px;
}

input {
  width: 80%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  font-size: 14px;
  background: #00c3ff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background: #0099cc;
}

#answer {
  margin-top: 20px;
  font-size: 18px;
}

.suggestions button {
  font-size: 12px;
  padding: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 AI Healthcare Assistant</h1>
<p>Ask how Artificial Intelligence is used in healthcare</p>

<input id="question" placeholder="Ask your question..." />
<br><br>

<button onclick="askAI()">Ask AI</button>

<br><br>

<div class="suggestions">
<p><b>Try these:</b></p>

<button onclick="setQ('What is AI in healthcare?')">1</button>
<button onclick="setQ('AI in diagnosis')">2</button>
<button onclick="setQ('Benefits of AI')">3</button>
<button onclick="setQ('AI for doctors')">4</button>
<button onclick="setQ('Machine learning in healthcare')">5</button>
<button onclick="setQ('Medical imaging AI')">6</button>
<button onclick="setQ('Disease prediction')">7</button>
<button onclick="setQ('Drug discovery AI')">8</button>
<button onclick="setQ('Risks of AI')">9</button>
<button onclick="setQ('Future of AI in healthcare')">10</button>

</div>

<div id="answer"></div>

</div>

<script>

function setQ(q){
  document.getElementById("question").value = q;
  askAI();
}

async function askAI(){
  const question = document.getElementById("question").value;

  if (!question) {
    document.getElementById("answer").innerText = "Please enter a question";
    return;
  }

  document.getElementById("answer").innerText = "Thinking...";

  try {
    const res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    // Handle server errors
    if (!res.ok) {
      const text = await res.text();
      document.getElementById("answer").innerText =
        "Server error: " + text;
      return;
    }

    const data = await res.json();

    // Handle missing answer
    if (!data.answer) {
      document.getElementById("answer").innerText =
        "No response from AI. Check API.";
    } else {
      document.getElementById("answer").innerText = data.answer;
    }

  } catch (error) {
    document.getElementById("answer").innerText =
      "Network error. Please try again.";
  }
}

</script>

</body>
</html>
